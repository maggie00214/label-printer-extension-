<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Label Printer</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header>
        <h1>超商標籤列印</h1>
        <p id="statusText">讀取設定中</p>
      </header>

      <label class="row">
        <span>啟用外掛</span>
        <input id="enabled" type="checkbox">
      </label>

      <label class="row">
        <span>自動列印</span>
        <input id="autoPrint" type="checkbox">
      </label>

      <label class="row">
        <span>略過空白標籤</span>
        <input id="skipBlankLabels" type="checkbox">
      </label>

      <label class="row">
        <span>除錯模式</span>
        <input id="debugMode" type="checkbox">
      </label>

      <label class="field">
        <span>列印延遲</span>
        <select id="printDelayMs">
          <option value="300">300 ms</option>
          <option value="500">500 ms</option>
          <option value="800">800 ms</option>
          <option value="1000">1000 ms</option>
          <option value="1500">1500 ms</option>
          <option value="2000">2000 ms</option>
        </select>
      </label>

      <label class="field">
        <span>全家縮放比例</span>
        <select id="familymartScalePercent">
          <option value="80">80%</option>
          <option value="85">85%</option>
          <option value="90">90%</option>
          <option value="95">95%</option>
          <option value="100">100%</option>
        </select>
      </label>

      <button id="runCurrentPage" type="button" class="primary">依目前網址啟動</button>

      <section class="providers">
        <label class="row">
          <span>全家 FamilyMart</span>
          <input id="familymartEnabled" type="checkbox">
        </label>
        <label class="row">
          <span>7-11</span>
          <input id="sevenElevenEnabled" type="checkbox">
        </label>
      </section>

      <button id="reset" type="button">重設預設值</button>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
